name: Deploy FleetNexa Server

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DEV server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /wwwroot/dev-fleetnexa
            git stash
            git pull origin develop
            npm install
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            sudo systemctl restart dev-fleetnexa-server.service

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to PROD server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /wwwroot/fleetnexa-server
            git stash
            git pull origin main
            npm install
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            sudo systemctl restart fleetnexa-server.service

  notify:
    needs: [deploy-dev, deploy-prod]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Discord Notify
        run: |
          STATUS="${{ job.status }}"
          curl -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🚀 FleetNexa Deploy\",
            \"embeds\": [{
              \"title\": \"Deployment $STATUS\",
              \"description\": \"Branch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\",
              \"color\": $([ \"$STATUS\" = \"success\" ] && echo 5763719 || echo 15548997)
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
