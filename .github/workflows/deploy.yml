name: Deploy FleetNexa Server

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DEV server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /wwwroot/dev-fleetnexa
            git stash
            git pull origin develop
            npm ci
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            sudo systemctl restart dev-fleetnexa-server.service

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to PROD server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /wwwroot/fleetnexa-server
            git stash
            git pull origin main
            npm ci
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            sudo systemctl restart fleetnexa-server.service

  notify:
    needs: [deploy-dev, deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notify
        run: |
          STATUS="${{ job.status }}"
          ENVIRONMENT=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "PRODUCTION" || echo "DEVELOPMENT")
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"FleetNexa Server Deployment\",
            \"blocks\": [
              {
                \"type\": \"section\",
                \"fields\": [
                  {\"type\": \"mrkdwn\", \"text\": \"*Status:* $STATUS\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Environment:* $ENVIRONMENT\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Branch:* ${{ github.ref_name }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Commit:* ${{ github.sha }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Author:* ${{ github.actor }}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Message:* ${{ github.event.head_commit.message }}\"}
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK }}
